---
defaultGroups:
  - name: users
    must_exist: true
    system: true
  - lp
  - video
  - network
  - storage
  - name: wheel
    must_exist: false
    system: true
  - audio
  - input

sudoersGroup: wheel
setRootPassword: true
doReusePassword: true
displayAutologin: true
doAutologin: true

passwordRequirements:
  minLength: 8
  maxLength: 64
  libpwquality:
    - minlen=4
    - minclass=2

user:
  shell: /bin/zsh
  forbidden_names: [ root ]

hostname:
  location: EtcFile
  writeHostsFile: true
  template: "churros-pc"
