---
modules-search:
  - local

instances:
  - id: fix-boot
    module: shellprocess
    config: shellprocess-fixboot.conf
  - id: pacman-init
    module: shellprocess
    config: shellprocess-pacman.conf
  - id: post-install
    module: shellprocess
    config: shellprocess-cleanup.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - netinstall
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - shellprocess@fix-boot
      - machineid
      - locale
      - keyboard
      - localecfg
      - fstab
      - initcpiocfg
      - initcpio
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - grubcfg
      - packages
      - shellprocess@pacman-init
      - bootloader
      - shellprocess@post-install
      - umount
  - show:
      - finished

branding: churros

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
